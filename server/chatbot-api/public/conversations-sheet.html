<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leads — sheet view</title>
  <style>
    :root {
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --header-bg: #f3f4f6;
      --stripe: #fafafa;
      --brand: #0d9488;
      --accent: #ecfeff;
      --danger: #b91c1c;
      font-family: system-ui, Segoe UI, Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background: #fff;
      font-size: 13px;
      line-height: 1.35;
    }
    .bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(#fff, #f9fafb);
    }
    .bar h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
      color: var(--brand);
      letter-spacing: -0.02em;
      margin-right: 8px;
    }
    details.auth {
      border: none;
      width: 100%;
    }
    details.auth > summary {
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      list-style-position: outside;
      padding: 4px 0;
    }
    .auth-inner {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 8px;
      align-items: end;
      margin-top: 6px;
    }
    @media (max-width: 680px) {
      .auth-inner { grid-template-columns: 1fr 1fr; }
    }
    label.mini {
      display: block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 3px;
    }
    input, select {
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font: inherit;
      font-size: 12px;
      width: 100%;
      max-width: 100%;
      background: #fff;
    }
    input:focus, select:focus {
      outline: 2px solid rgba(13, 148, 136, 0.25);
      border-color: var(--brand);
    }
    button {
      padding: 5px 10px;
      border-radius: 6px;
      font: inherit;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: #fff;
      white-space: nowrap;
    }
    button.primary {
      background: linear-gradient(#14b8a6, var(--brand));
      color: #fff;
      border-color: transparent;
    }
    button.primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    button.preset {
      font-size: 11px;
      padding: 3px 8px;
    }
    .tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: end;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }
    .tool {
      flex: 0 1 auto;
      min-width: 100px;
    }
    .tool.grow {
      flex: 1 1 160px;
      min-width: 140px;
    }
    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: flex-end;
    }
    #statusLine {
      font-size: 11px;
      color: var(--muted);
      width: 100%;
      margin-top: 4px;
    }
    .err {
      margin: 6px 10px;
      padding: 6px 10px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--danger);
      border-radius: 6px;
      font-size: 12px;
    }
    #sheetWrap {
      overflow: auto;
      max-height: calc(100dvh - 148px);
      border-bottom: 1px solid var(--border);
      background: var(--accent);
    }
    table.sheet {
      border-collapse: collapse;
      background: #fff;
      font-size: 11px;
      min-width: 100%;
      table-layout: auto;
    }
    table.sheet th,
    table.sheet td {
      border: 1px solid #cbd5e1;
      padding: 2px 6px;
      vertical-align: top;
      max-width: 320px;
      word-break: break-word;
      white-space: pre-wrap;
      line-height: 1.35;
      hyphens: auto;
    }
    table.sheet thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--header-bg);
      font-weight: 700;
      text-align: left;
      color: #334155;
      box-shadow: 0 1px 0 var(--border);
      white-space: nowrap;
      max-width: none;
      padding: 4px 6px;
    }
    tbody tr:nth-child(even) {
      background: var(--stripe);
    }
    tbody tr:hover td {
      background: #eefcfb;
    }
    table.sheet td a {
      color: #0f766e;
      word-break: break-all;
    }
    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
    .kbd {
      font-family: ui-monospace, monospace;
      font-size: 0.9em;
      background: #f1f5f9;
      padding: 0 5px;
      border-radius: 4px;
    }
    .pill {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 99px;
      background: var(--accent);
      color: var(--brand);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="bar">
    <h1>Lead sheet view</h1>
    <span class="pill" id="rowPill">&nbsp;</span>
  </div>

  <details class="auth" open id="authBox">
    <summary>Viewer secret &mdash; hide when set</summary>
    <div class="auth-inner" style="max-width: 720px;">
      <div style="grid-column: 1 / -1;">
        <label class="mini" for="secret">CONVERSATIONS_SHEET_VIEW_SECRET</label>
        <input id="secret" type="password" autocomplete="current-password" placeholder="Paste Railway secret / Enter to load" />
      </div>
      <button type="button" id="toggleSecret">Show</button>
      <button type="button" id="saveSecret">Save in tab</button>
      <button type="button" class="primary" id="refreshBtn">Reload</button>
    </div>
    <p style="margin: 8px 0 0; font-size: 11px; color: var(--muted); max-width: 720px;">
      Name must match <span class="kbd">CONVERSATIONS_SHEET_VIEW_SECRET</span> on Railway &mdash; redeploy after edits.
      Table mirrors your sheet columns left-to-right. Use date range below to slice rows.
    </p>
  </details>

  <div class="tools">
    <div class="tool grow">
      <label class="mini" for="filter">Contains (any column)</label>
      <input id="filter" type="text" placeholder="Optional text filter…" autocomplete="off" />
    </div>
    <div class="tool">
      <label class="mini" for="dateFrom">From date</label>
      <input id="dateFrom" type="date" />
    </div>
    <div class="tool">
      <label class="mini" for="dateTo">To date</label>
      <input id="dateTo" type="date" />
    </div>
    <div class="tool">
      <label class="mini" for="sortOrder">Order</label>
      <select id="sortOrder">
        <option value="sheet">Like sheet &mdash; oldest &rarr; newest</option>
        <option value="newest">Newest first</option>
      </select>
    </div>
    <div class="tool">
      <label class="mini" for="limit">Load rows</label>
      <select id="limit">
        <option value="50">50</option>
        <option value="100" selected>100</option>
        <option value="200">200</option>
        <option value="300">300</option>
      </select>
    </div>
    <div class="presets tool" style="min-width: 200px;">
      <span class="mini" style="width:100%; margin-bottom:2px;">Quick range</span>
      <button type="button" class="preset" data-preset="all">Any</button>
      <button type="button" class="preset" data-preset="today">Today</button>
      <button type="button" class="preset" data-preset="7">7 days</button>
      <button type="button" class="preset" data-preset="30">30 days</button>
      <button type="button" class="preset" data-preset="clear">Clear dates</button>
    </div>
  </div>
  <div id="statusLine" style="padding: 4px 10px;"></div>

  <div id="errBox" class="err" style="display: none;"></div>

  <div id="sheetWrap">
    <div id="convList"><div class="empty">Paste secret and Reload, or Saved secret will load automatically.</div></div>
  </div>

  <script>
    (function () {
      var LS_KEY = "conversations_sheet_secret_v1";
      var secretEl = document.getElementById("secret");
      var filterEl = document.getElementById("filter");
      var limitEl = document.getElementById("limit");
      var refreshBtn = document.getElementById("refreshBtn");
      var statusLine = document.getElementById("statusLine");
      var errBox = document.getElementById("errBox");
      var convList = document.getElementById("convList");
      var dateFromEl = document.getElementById("dateFrom");
      var dateToEl = document.getElementById("dateTo");
      var sortOrderEl = document.getElementById("sortOrder");
      var rowPill = document.getElementById("rowPill");
      var authBox = document.getElementById("authBox");

      function apiBase() {
        return "";
      }

      function normKey(s) {
        return String(s || "")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]/g, "");
      }

      function pad2(n) {
        return n < 10 ? "0" + n : String(n);
      }

      /** Local calendar YYYY-MM-DD */
      function toYmdLocal(d) {
        if (!(d instanceof Date) || isNaN(d.getTime())) return null;
        return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
      }

      /** Try Date + optional Time strings from Sheet (Intl / manual). */
      function parseConversationInstant(dateStr, timeStr) {
        var ds = String(dateStr || "").trim();
        var ts = String(timeStr || "").trim();
        if (!ds) return null;
        var cand = ds + (ts ? " " + ts : "");
        var t = Date.parse(cand);
        if (!isNaN(t)) return new Date(t);
        t = Date.parse(ds);
        if (!isNaN(t)) return new Date(t);
        return null;
      }

      function findCell(row, candidates) {
        var map = {};
        var keys = Object.keys(row);
        for (var i = 0; i < keys.length; i++) {
          map[normKey(keys[i])] = row[keys[i]];
        }
        for (var c = 0; c < candidates.length; c++) {
          var nk = normKey(candidates[c]);
          if (map[nk]) return String(map[nk]);
        }
        return "";
      }

      /** YYYY-MM-DD for range compare, local day of conversation */
      function rowDayYmd(row) {
        var dStr = findCell(row, ["Date", "Conv date", "Conversation date", "Datetime", "Timestamp"]);
        var tStr = findCell(row, ["Time", "Conv time", "Conversation time"]);
        var inst = parseConversationInstant(dStr, tStr);
        return toYmdLocal(inst);
      }

      function inDateRange(ymd) {
        var from = dateFromEl.value;
        var to = dateToEl.value;
        if (!from && !to) return true;
        if (!ymd) return false;
        if (from && ymd < from) return false;
        if (to && ymd > to) return false;
        return true;
      }

      function linkifyToNode(text) {
        var s = String(text || "");
        var lines = s.split(/\r?\n/);
        var frag = document.createDocumentFragment();
        for (var i = 0; i < lines.length; i++) {
          if (i) frag.appendChild(document.createElement("br"));
          var line = lines[i];
          var m = /^(https?:\/\/[^\s]+)$/i.exec(line.trim());
          if (m) {
            var a = document.createElement("a");
            a.href = m[1];
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.textContent =
              line.length > 96 ? line.slice(0, 93).trim() + "…" : line;
            frag.appendChild(a);
          } else {
            frag.appendChild(document.createTextNode(line || " "));
          }
        }
        return frag;
      }

      function showErr(msg) {
        errBox.style.display = msg ? "block" : "none";
        errBox.textContent = msg || "";
      }

      function setStatus(t) {
        statusLine.textContent = t || "";
      }

      try {
        var saved = sessionStorage.getItem(LS_KEY);
        if (saved) {
          secretEl.value = saved;
          authBox.open = false;
        }
      } catch (e) {}

      document.getElementById("toggleSecret").addEventListener("click", function () {
        secretEl.type = secretEl.type === "password" ? "text" : "password";
      });

      document.getElementById("saveSecret").addEventListener("click", function () {
        try {
          sessionStorage.setItem(LS_KEY, secretEl.value.trim());
          authBox.open = false;
          setStatus("Secret saved.");
        } catch (e) {
          setStatus("Could not save secret.");
        }
      });

      function rowMatchesFilter(row, q) {
        if (!q) return true;
        var low = q.toLowerCase();
        var keys = Object.keys(row);
        for (var i = 0; i < keys.length; i++) {
          if (String(row[keys[i]] || "").toLowerCase().indexOf(low) >= 0) return true;
        }
        return false;
      }

      function applyPresets(which) {
        var now = new Date();
        function ymdOff(days) {
          var d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - days);
          return toYmdLocal(d);
        }
        var today = toYmdLocal(now);
        if (which === "all" || which === "clear") {
          dateFromEl.value = "";
          dateToEl.value = "";
        } else if (which === "today") {
          dateFromEl.value = today;
          dateToEl.value = today;
        } else if (which === "7") {
          dateFromEl.value = ymdOff(6);
          dateToEl.value = today;
        } else if (which === "30") {
          dateFromEl.value = ymdOff(29);
          dateToEl.value = today;
        }
        if (lastPayload) render(lastPayload);
      }

      document.querySelectorAll("[data-preset]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          applyPresets(btn.getAttribute("data-preset"));
        });
      });

      var lastPayload = null;

      function compareRowsSheetLike(a, b) {
        var da = parseConversationInstant(
          findCell(a, ["Date", "Conv date", "Conversation date", "Datetime"]),
          findCell(a, ["Time", "Conv time"])
        );
        var db = parseConversationInstant(
          findCell(b, ["Date", "Conv date", "Conversation date", "Datetime"]),
          findCell(b, ["Time", "Conv time"])
        );
        var ta = da ? da.getTime() : 0;
        var tb = db ? db.getTime() : 0;
        return ta - tb;
      }

      function render(data) {
        lastPayload = data;
        var q = filterEl.value.trim();
        var headers = data.headers && data.headers.length ? data.headers : [];
        var rawRows = data.conversations || [];
        convList.innerHTML = "";

        if (!headers.length && rawRows.length) {
          headers = Object.keys(rawRows[0]);
        }

        /** @type {Record<string,string>[]} */
        var rows = [];
        for (var i = 0; i < rawRows.length; i++) {
          rows.push(rawRows[i]);
        }

        var order = sortOrderEl.value === "sheet" ? "sheet" : "newest";
        if (order === "sheet") {
          rows.sort(compareRowsSheetLike);
        } else {
          rows.sort(function (a, b) {
            return compareRowsSheetLike(b, a);
          });
        }

        var filtered = [];
        for (var r = 0; r < rows.length; r++) {
          var row = rows[r];
          if (!rowMatchesFilter(row, q)) continue;
          var ymd = rowDayYmd(row);
          if (!inDateRange(ymd)) {
            continue;
          }
          filtered.push(row);
        }

        rowPill.textContent =
          filtered.length + " row" + (filtered.length === 1 ? "" : "s") +
          (dateFromEl.value || dateToEl.value ? " · date-filtered" : "");

        if (!filtered.length) {
          var emp = document.createElement("div");
          emp.className = "empty";
          emp.textContent = rawRows.length
            ? "No rows match text / date filters."
            : "No rows returned from API.";
          convList.appendChild(emp);
          return;
        }

        var tbl = document.createElement("table");
        tbl.className = "sheet";
        var thead = document.createElement("thead");
        var trh = document.createElement("tr");
        for (var hi = 0; hi < headers.length; hi++) {
          var th = document.createElement("th");
          th.textContent = headers[hi];
          trh.appendChild(th);
        }
        thead.appendChild(trh);
        tbl.appendChild(thead);

        var tbody = document.createElement("tbody");
        for (var ri = 0; ri < filtered.length; ri++) {
          var row = filtered[ri];
          var tr = document.createElement("tr");
          for (var ci = 0; ci < headers.length; ci++) {
            var td = document.createElement("td");
            var raw = row[headers[ci]];
            td.appendChild(linkifyToNode(raw == null ? "" : String(raw)));
            td.title = String(raw || "").slice(0, 2000);
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
        }
        tbl.appendChild(tbody);
        convList.appendChild(tbl);
      }

      function wireFilter() {
        filterEl.addEventListener("input", function () {
          if (lastPayload) render(lastPayload);
        });
        dateFromEl.addEventListener("change", function () {
          if (lastPayload) render(lastPayload);
        });
        dateFromEl.addEventListener("input", function () {
          if (lastPayload) render(lastPayload);
        });
        dateToEl.addEventListener("change", function () {
          if (lastPayload) render(lastPayload);
        });
        dateToEl.addEventListener("input", function () {
          if (lastPayload) render(lastPayload);
        });
        sortOrderEl.addEventListener("change", function () {
          if (lastPayload) render(lastPayload);
        });
      }
      wireFilter();

      async function load() {
        var secret = secretEl.value.trim();
        showErr("");
        if (!secret) {
          showErr("Enter viewer secret.");
          return;
        }
        refreshBtn.disabled = true;
        var reloadLbl = refreshBtn.textContent;
        refreshBtn.textContent = "Loading…";
        setStatus("Loading…");
        var timedId = 0;
        try {
          var lim = parseInt(String(limitEl.value), 10) || 100;
          var url = apiBase() + "/api/conversations-sheet?limit=" + encodeURIComponent(lim);
          var ctrl = new AbortController();
          timedId = window.setTimeout(function () {
            ctrl.abort();
          }, 78000);
          var res = await fetch(url, {
            method: "GET",
            headers: { "X-Conversations-Sheet-Secret": secret },
            cache: "no-store",
            credentials: "same-origin",
            signal: ctrl.signal
          });
          var json = await res.json().catch(function () {
            return null;
          });
          if (!res.ok || !json || !json.ok) {
            showErr((json && json.error) || "HTTP " + res.status);
            setStatus("");
            return;
          }
          setStatus(
            "Spreadsheet “" +
              (json.title || "?") +
              "” · tab " +
              (json.tab || "?") +
              " · ~" +
              (json.rowCount || "?") +
              " rows tall · loaded " +
              (json.conversations || []).length +
              " recent lead row(s)."
          );
          render(json);
        } catch (e) {
          if (e && e.name === "AbortError") showErr("Timed out.");
          else showErr(String(e && e.message ? e.message : e));
          setStatus("");
        } finally {
          if (timedId) window.clearTimeout(timedId);
          refreshBtn.disabled = false;
          refreshBtn.textContent = reloadLbl;
        }
      }

      refreshBtn.addEventListener("click", load);
      secretEl.addEventListener("keydown", function (ev) {
        if (ev.key === "Enter") load();
      });

      if (secretEl.value.trim()) load();
    })();
  </script>
</body>
</html>

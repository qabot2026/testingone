<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conversation transcript</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: linear-gradient(180deg, #f1f5f9 0%, #e2e8f0 100%);
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: rgba(148, 163, 184, 0.4);
      --user: #0d9488;
      --user-soft: #ccfbf1;
      --bot: #334155;
      --bot-soft: #e9eef5;
      --radius: 16px;
      --radius-sm: 12px;
      font-family: "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.45;
      color: var(--text);
      background: var(--bg);
      min-height: 100dvh;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    .top {
      flex-shrink: 0;
      padding: 16px clamp(16px, 4vw, 28px) 12px;
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 10px;
      box-shadow: 0 2px 12px rgba(15, 23, 42, 0.05);
    }
    label.mini {
      display: block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font: inherit;
    }
    button.primary {
      margin-top: 10px;
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #14b8a6, #0d9488);
      color: #f0fdfa;
    }
    button.ghost {
      margin-top: 8px;
      width: 100%;
      padding: 6px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
      text-decoration: underline;
    }
    button.primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .err {
      color: #b91c1c;
      font-size: 0.8rem;
      margin-top: 8px;
    }
    .main-grid {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: clamp(16px, 2.5vw, 24px);
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 clamp(16px, 4vw, 28px) 24px;
      min-height: 0;
      align-items: stretch;
    }
    @media (min-width: 900px) {
      .main-grid.main-grid--split {
        grid-template-columns: minmax(0, 1fr) minmax(260px, 380px);
        align-items: start;
      }
    }
    .chat-column {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: calc(100dvh - clamp(132px, 22vh, 280px));
    }
    .main-grid.main-grid--split .chat-column {
      max-height: calc(100dvh - clamp(100px, 16vh, 200px));
    }
    .summary-rail {
      min-width: 0;
      display: none;
    }
    .main-grid.main-grid--split .summary-rail {
      display: block;
    }
    .summary-rail-inner {
      position: sticky;
      top: 12px;
      max-height: calc(100dvh - 24px);
      overflow-y: auto;
      scrollbar-gutter: stable;
      padding-bottom: 8px;
    }
    .details-wrap {
      max-width: none;
      width: 100%;
      margin: 0;
      padding: 0;
    }
    .details-wrap h2 {
      margin: 0 0 8px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 700;
    }
    .dl-grid {
      display: grid;
      gap: 8px 14px;
      grid-template-columns: minmax(100px, 34%) 1fr;
      font-size: 0.82rem;
    }
    .dl-grid dt {
      margin: 0;
      color: var(--muted);
      font-weight: 600;
    }
    .dl-grid dd {
      margin: 0;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      width: 100%;
      margin: 0;
      padding: 0;
    }
    .chat-stream {
      flex: 1;
      min-height: 220px;
      overflow-y: auto;
      padding: 12px 4px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-gutter: stable;
      background: rgba(255, 255, 255, 0.35);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
    .day-line {
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      padding: 6px 0;
    }
    .msg {
      max-width: 92%;
      padding: 10px 14px;
      border-radius: var(--radius);
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.92rem;
    }
    .msg-body--rich {
      white-space: normal;
    }
    .rc-block {
      margin-top: 6px;
    }
    .rc-block:first-child {
      margin-top: 0;
    }
    .rc-text {
      white-space: pre-wrap;
      margin: 0 0 6px;
    }
    .rc-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .rc-chip {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.55);
      background: #fff;
      font-size: 0.82rem;
      line-height: 1.2;
      color: var(--text);
    }
    .rc-img {
      display: block;
      max-width: 100%;
      width: auto;
      max-height: 200px;
      border-radius: 10px;
      margin: 4px 0;
      object-fit: cover;
      border: 1px solid var(--border);
    }
    .rc-gallery {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 6px;
      margin: 4px 0;
    }
    .rc-gallery .rc-img {
      flex: 0 0 auto;
      width: min(76vw, 180px);
      max-height: 126px;
    }
    .rc-info {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
      margin: 6px 0;
      max-width: 280px;
    }
    .rc-info-title {
      font-weight: 700;
      font-size: 0.9rem;
      margin: 0 0 2px;
    }
    .rc-info-sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin: 0 0 6px;
    }
    .rc-info-text {
      font-size: 0.82rem;
      margin: 6px 0 0;
      white-space: pre-wrap;
    }
    .rc-btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .rc-btn {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid rgba(13, 148, 136, 0.35);
      background: rgba(204, 251, 241, 0.5);
      font-size: 0.78rem;
      color: #0f766e;
      text-decoration: none;
    }
    .rc-btn--ghost {
      background: #fff;
      border-color: rgba(148, 163, 184, 0.5);
      color: var(--text);
    }
    .rc-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      margin: 6px 0;
      max-width: 240px;
    }
    .rc-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      display: block;
    }
    .rc-card-body {
      padding: 8px 10px;
    }
    .rc-select-hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin: 4px 0 6px;
    }
    .rc-file a {
      color: #0d9488;
      font-weight: 600;
    }
    .rc-video {
      position: relative;
      width: 100%;
      max-width: 320px;
      aspect-ratio: 16 / 9;
      margin: 6px 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .rc-video iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .msg--user {
      align-self: flex-end;
      background: var(--user-soft);
      border-bottom-right-radius: 4px;
      margin-left: 18%;
      border: 1px solid rgba(13, 148, 136, 0.2);
    }
    .msg--assistant {
      align-self: flex-start;
      background: var(--bot-soft);
      border-bottom-left-radius: 4px;
      margin-right: 10%;
      border: 1px solid rgba(51, 65, 85, 0.12);
    }
    .msg .who {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px 12px;
      font-size: 0.62rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 4px;
      color: var(--user);
    }
    .msg--assistant .who {
      color: var(--bot);
    }
    .msg .who-label {
      min-width: 0;
      flex-shrink: 0;
    }
    .msg .msg-time {
      font-weight: 600;
      text-transform: none;
      letter-spacing: 0.02em;
      color: var(--muted);
      font-size: 0.68rem;
      white-space: nowrap;
      margin-left: auto;
    }
    .empty-hint {
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      padding: 24px 12px;
    }
  </style>
</head>
<body>
  <header class="top">
    <h1>Conversation</h1>
    <div class="panel" id="authPanel">
      <label class="mini" for="secret">Viewer secret</label>
      <input id="secret" type="password" autocomplete="current-password" placeholder="Same as conversations inbox" />
      <button type="button" class="primary" id="loadBtn">Load conversation</button>
      <button type="button" class="ghost" id="toggleAuth" hidden>Show secret field</button>
      <p class="err" id="errBox" hidden></p>
    </div>
  </header>

  <div class="main-grid" id="mainGrid">
    <div class="chat-column">
      <div class="chat-wrap">
        <div class="chat-stream" id="thread" aria-live="polite"></div>
      </div>
    </div>
    <aside class="summary-rail" id="summaryRail" hidden>
      <div class="summary-rail-inner">
        <div class="details-wrap" id="detailsWrap" hidden>
          <h2>Summary</h2>
          <div class="panel">
            <dl class="dl-grid" id="detailsDl"></dl>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <script>
    (function () {
      var LS_KEY = "conversations_sheet_secret_v1";
      var secretEl = document.getElementById("secret");
      var loadBtn = document.getElementById("loadBtn");
      var errBox = document.getElementById("errBox");
      var thread = document.getElementById("thread");
      var detailsWrap = document.getElementById("detailsWrap");
      var detailsDl = document.getElementById("detailsDl");
      var authPanel = document.getElementById("authPanel");
      var toggleAuth = document.getElementById("toggleAuth");
      var mainGrid = document.getElementById("mainGrid");
      var summaryRail = document.getElementById("summaryRail");

      function readSavedViewerSecret() {
        try {
          var s = sessionStorage.getItem(LS_KEY) || localStorage.getItem(LS_KEY) || "";
          return typeof s === "string" ? s.trim() : "";
        } catch (ignore) {
          return "";
        }
      }

      function persistViewerSecret(secret) {
        var s = typeof secret === "string" ? secret.trim() : "";
        if (!s) return;
        try {
          sessionStorage.setItem(LS_KEY, s);
        } catch (ignore) {}
        try {
          localStorage.setItem(LS_KEY, s);
        } catch (ignore) {}
      }

      var savedSecret = readSavedViewerSecret();
      if (savedSecret) {
        secretEl.value = savedSecret;
      }

      function escapeHtml(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      var TRANSCRIPT_NOISE_LINES = {
        HANDLER_PROMPT: true,
        "Virtual Agent": true,
        Chips: true,
        chips: true,
        chip: true
      };

      function unwrapPayloadString(v) {
        if (typeof v === "string") {
          return v.trim();
        }
        if (v && typeof v === "object" && typeof v.stringValue === "string") {
          return v.stringValue.trim();
        }
        return "";
      }

      function imageUrlFromRichNode(node) {
        if (!node || typeof node !== "object") {
          return "";
        }
        if (typeof node.rawUrl === "string" && node.rawUrl.trim()) {
          return node.rawUrl.trim();
        }
        var img = node.image;
        if (!img || typeof img !== "object") {
          return "";
        }
        if (typeof img.rawUrl === "string" && img.rawUrl.trim()) {
          return img.rawUrl.trim();
        }
        if (img.src && typeof img.src.rawUrl === "string" && img.src.rawUrl.trim()) {
          return img.src.rawUrl.trim();
        }
        return "";
      }

      function linkFromRichNode(node) {
        if (!node || typeof node !== "object") {
          return "";
        }
        if (typeof node.actionLink === "string" && node.actionLink.trim()) {
          return node.actionLink.trim();
        }
        if (node.anchor && typeof node.anchor.href === "string" && node.anchor.href.trim()) {
          return node.anchor.href.trim();
        }
        if (node.anchor && typeof node.anchor === "string" && node.anchor.trim()) {
          return node.anchor.trim();
        }
        return "";
      }

      function renderRichChipsHtml(options) {
        if (!Array.isArray(options) || !options.length) {
          return "";
        }
        var parts = ['<div class="rc-chips">'];
        for (var ci = 0; ci < options.length; ci += 1) {
          var opt = options[ci];
          var label =
            typeof opt === "string"
              ? opt.trim()
              : unwrapPayloadString(opt && opt.text) || unwrapPayloadString(opt && opt.label);
          if (!label || TRANSCRIPT_NOISE_LINES[label]) {
            continue;
          }
          parts.push('<span class="rc-chip">' + escapeHtml(label) + "</span>");
        }
        parts.push("</div>");
        return parts.join("");
      }

      function renderRichItemHtml(item) {
        if (!item || typeof item !== "object") {
          return "";
        }
        var type = String(item.type || "").toLowerCase();
        if (type === "chips") {
          return '<div class="rc-block">' + renderRichChipsHtml(item.options) + "</div>";
        }
        if (type === "image") {
          var iu = imageUrlFromRichNode(item);
          if (!iu) {
            return "";
          }
          return (
            '<div class="rc-block"><img class="rc-img" src="' +
            escapeHtml(iu) +
            '" alt="' +
            escapeHtml(unwrapPayloadString(item.accessibilityText) || "") +
            '" loading="lazy" /></div>'
          );
        }
        if (type === "info" || type === "accordion") {
          var title = unwrapPayloadString(item.title);
          var sub = unwrapPayloadString(item.subtitle);
          var body = unwrapPayloadString(item.text);
          var iu2 = imageUrlFromRichNode(item);
          var href = linkFromRichNode(item);
          var html = '<div class="rc-block"><div class="rc-info">';
          if (iu2) {
            if (href) {
              html +=
                '<a href="' +
                escapeHtml(href) +
                '" target="_blank" rel="noopener noreferrer"><img class="rc-img" src="' +
                escapeHtml(iu2) +
                '" alt="" loading="lazy" /></a>';
            } else {
              html += '<img class="rc-img" src="' + escapeHtml(iu2) + '" alt="" loading="lazy" />';
            }
          }
          if (title) {
            html += '<div class="rc-info-title">' + escapeHtml(title) + "</div>";
          }
          if (sub) {
            html += '<div class="rc-info-sub">' + escapeHtml(sub) + "</div>";
          }
          if (body) {
            html += '<div class="rc-info-text">' + escapeHtml(body) + "</div>";
          }
          var btns = Array.isArray(item.buttons) ? item.buttons : [];
          if (btns.length) {
            html += '<div class="rc-btn-row">';
            for (var bi = 0; bi < btns.length; bi += 1) {
              var bt = btns[bi];
              var btLabel = unwrapPayloadString(bt && bt.text) || unwrapPayloadString(bt && bt.label);
              var btHref =
                (bt && typeof bt.link === "string" && bt.link.trim()) ||
                (bt && bt.link && typeof bt.link === "object" && typeof bt.link.uri === "string"
                  ? bt.link.uri.trim()
                  : "") ||
                href;
              if (!btLabel) {
                continue;
              }
              if (btHref) {
                html +=
                  '<a class="rc-btn" href="' +
                  escapeHtml(btHref) +
                  '" target="_blank" rel="noopener noreferrer">' +
                  escapeHtml(btLabel) +
                  "</a>";
              } else {
                html += '<span class="rc-btn rc-btn--ghost">' + escapeHtml(btLabel) + "</span>";
              }
            }
            html += "</div>";
          } else if (href && title) {
            html +=
              '<div class="rc-btn-row"><a class="rc-btn" href="' +
              escapeHtml(href) +
              '" target="_blank" rel="noopener noreferrer">Open link</a></div>';
          }
          html += "</div></div>";
          return html;
        }
        if (type === "files" && Array.isArray(item.files)) {
          var fh = '<div class="rc-block rc-file">';
          for (var fi = 0; fi < item.files.length; fi += 1) {
            var f = item.files[fi];
            if (!f || typeof f !== "object") {
              continue;
            }
            var fname = unwrapPayloadString(f.name) || "Download";
            var fhref =
              (f.anchor && typeof f.anchor.href === "string" && f.anchor.href.trim()) || "";
            if (fhref) {
              fh += '<div><a href="' + escapeHtml(fhref) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(fname) + "</a></div>";
            } else {
              fh += "<div>" + escapeHtml(fname) + "</div>";
            }
          }
          fh += "</div>";
          return fh;
        }
        return "";
      }

      function renderRichContentRows(richContent) {
        if (!Array.isArray(richContent) || !richContent.length) {
          return "";
        }
        var out = "";
        for (var ri = 0; ri < richContent.length; ri += 1) {
          var row = richContent[ri];
          if (!Array.isArray(row)) {
            continue;
          }
          var rowImgs = [];
          var rowHtml = "";
          for (var ci = 0; ci < row.length; ci += 1) {
            var piece = renderRichItemHtml(row[ci]);
            if (!piece) {
              continue;
            }
            if (row[ci] && String(row[ci].type || "").toLowerCase() === "image") {
              rowImgs.push(piece);
            } else {
              rowHtml += piece;
            }
          }
          if (rowImgs.length > 1) {
            out += '<div class="rc-gallery">' + rowImgs.join("") + "</div>";
          } else if (rowImgs.length === 1) {
            out += rowImgs[0];
          }
          out += rowHtml;
        }
        return out;
      }

      function youtubeEmbedUrl(url) {
        var u = typeof url === "string" ? url.trim() : "";
        if (!u) {
          return "";
        }
        var m = u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{6,})/i);
        return m ? "https://www.youtube.com/embed/" + m[1] : "";
      }

      function renderActionPayloadHtml(pl) {
        if (!pl || typeof pl !== "object") {
          return "";
        }
        var action = String(pl.action || "").toLowerCase();
        var html = "";
        var msg = unwrapPayloadString(pl.message);
        if (msg) {
          html += '<p class="rc-text">' + escapeHtml(msg) + "</p>";
        }
        if (action === "open_gallery" && Array.isArray(pl.urls) && pl.urls.length) {
          html += '<div class="rc-gallery">';
          for (var gi = 0; gi < pl.urls.length; gi += 1) {
            var gu = typeof pl.urls[gi] === "string" ? pl.urls[gi].trim() : "";
            if (gu) {
              html += '<img class="rc-img" src="' + escapeHtml(gu) + '" alt="" loading="lazy" />';
            }
          }
          html += "</div>";
          html += renderRichChipsHtml(pl.options);
        } else if (action === "open_video" && pl.url) {
          var emb = youtubeEmbedUrl(unwrapPayloadString(pl.url));
          if (emb) {
            html +=
              '<div class="rc-video"><iframe src="' +
              escapeHtml(emb) +
              '" title="Video" allowfullscreen loading="lazy"></iframe></div>';
          }
          html += renderRichChipsHtml(pl.options);
        } else if (action === "open_card_carousel" && Array.isArray(pl.cards)) {
          for (var ci = 0; ci < pl.cards.length; ci += 1) {
            var card = pl.cards[ci];
            if (!card || typeof card !== "object") {
              continue;
            }
            var cTitle = unwrapPayloadString(card.title);
            var cSub = unwrapPayloadString(card.subtitle);
            var cImg = typeof card.imageUrl === "string" ? card.imageUrl.trim() : "";
            html += '<div class="rc-card">';
            if (cImg) {
              html += '<img src="' + escapeHtml(cImg) + '" alt="" loading="lazy" />';
            }
            html += '<div class="rc-card-body">';
            if (cTitle) {
              html += '<div class="rc-info-title">' + escapeHtml(cTitle) + "</div>";
            }
            if (cSub) {
              html += '<div class="rc-info-sub">' + escapeHtml(cSub) + "</div>";
            }
            var cta = unwrapPayloadString(card.ctaLabel) || "View";
            html += '<span class="rc-btn rc-btn--ghost">' + escapeHtml(cta) + "</span>";
            html += "</div></div>";
          }
        } else if (action === "dfchat_inline_select" && Array.isArray(pl.options)) {
          var ph = unwrapPayloadString(pl.placeholder) || "Choose…";
          html += '<div class="rc-select-hint">' + escapeHtml(ph) + "</div>";
          html += renderRichChipsHtml(
            pl.options.map(function (o) {
              return { text: unwrapPayloadString(o && o.label) || unwrapPayloadString(o && o.value) };
            })
          );
        } else if (action === "open_form") {
          var fid = unwrapPayloadString(pl.form_id) || unwrapPayloadString(pl.formId) || "form";
          html += '<p class="rc-text">Contact form: <strong>' + escapeHtml(fid) + "</strong></p>";
        }
        return html;
      }

      function resolveTurnRich(turn) {
        if (turn && turn.rich && typeof turn.rich === "object") {
          return turn.rich;
        }
        var raw = turn && typeof turn.text === "string" ? turn.text.trim() : "";
        if (raw.charAt(0) === "{" && (raw.indexOf("richContent") >= 0 || raw.indexOf('"action"') >= 0)) {
          try {
            var parsed = JSON.parse(raw);
            if (parsed && typeof parsed === "object") {
              return parsed;
            }
          } catch (ignore) {}
        }
        return null;
      }

      function sanitizeTranscriptText(text, rich) {
        var t = typeof text === "string" ? text.trim() : "";
        if (!t) {
          return "";
        }
        if (!rich) {
          return t;
        }
        var lines = t.split(/\r?\n/).map(function (ln) {
          return ln.trim();
        });
        var kept = [];
        for (var i = 0; i < lines.length; i += 1) {
          if (!lines[i] || TRANSCRIPT_NOISE_LINES[lines[i]]) {
            continue;
          }
          if (lines[i] === "Chips" && rich.richContent) {
            continue;
          }
          kept.push(lines[i]);
        }
        return kept.join("\n").trim();
      }

      function salvageChipsFromLegacyText(text) {
        var lines = String(text || "")
          .split(/\r?\n/)
          .map(function (ln) {
            return ln.trim();
          })
          .filter(function (ln) {
            return ln && !TRANSCRIPT_NOISE_LINES[ln];
          });
        if (lines.length < 2) {
          return null;
        }
        var allShort = true;
        for (var i = 0; i < lines.length; i += 1) {
          if (lines[i].length > 48 || /[.!?…]/.test(lines[i])) {
            allShort = false;
            break;
          }
        }
        if (!allShort) {
          return null;
        }
        return {
          richContent: [
            [
              {
                type: "chips",
                options: lines.map(function (t) {
                  return { text: t };
                })
              }
            ]
          ]
        };
      }

      function renderTurnBodyHtml(turn) {
        var rich = resolveTurnRich(turn);
        var text = sanitizeTranscriptText(turn && turn.text, rich);
        if (!rich && text) {
          rich = salvageChipsFromLegacyText(text);
          if (rich) {
            text = "";
          }
        }
        var html = "";
        if (text) {
          html += '<p class="rc-text">' + escapeHtml(text) + "</p>";
        }
        if (rich) {
          if (Array.isArray(rich.richContent)) {
            html += renderRichContentRows(rich.richContent);
          } else if (rich.action) {
            html += renderActionPayloadHtml(rich);
          } else if (Array.isArray(rich.cards)) {
            html += renderActionPayloadHtml({ action: "open_card_carousel", cards: rich.cards, message: rich.message });
          } else if (Array.isArray(rich.urls)) {
            html += renderActionPayloadHtml({ action: "open_gallery", urls: rich.urls, options: rich.options, message: rich.message });
          }
        }
        if (html) {
          return html;
        }
        return '<p class="rc-text">(No message text was stored for this line.)</p>';
      }

      /** Match `company.js` getBotPersonaMessageTimeLabel (`en-IN`, optional short date). */
      function formatPersonaClockLabel(tzRaw, ms, includeDate) {
        var tz =
          tzRaw && String(tzRaw).trim()
            ? String(tzRaw).trim()
            : "Asia/Kolkata";
        var d = new Date(ms);
        if (Number.isNaN(d.getTime())) {
          return "";
        }
        try {
          if (includeDate) {
            return new Intl.DateTimeFormat("en-IN", {
              timeZone: tz,
              month: "short",
              day: "numeric",
              hour: "2-digit",
              minute: "2-digit",
              second: "2-digit",
              hour12: true
            }).format(d);
          }
          return new Intl.DateTimeFormat("en-IN", {
            timeZone: tz,
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hour12: true
          }).format(d);
        } catch {
          return "";
        }
      }

      function sessionFromUrl() {
        try {
          var q = new URLSearchParams(window.location.search).get("session");
          return q && q.trim() ? q.trim() : "";
        } catch {
          return "";
        }
      }

      function showErr(msg) {
        if (!msg) {
          errBox.hidden = true;
          errBox.textContent = "";
          return;
        }
        errBox.hidden = false;
        errBox.textContent = msg;
      }

      function prettyLabel(k) {
        var s = String(k || "");
        if (s.length > 64) return s.slice(0, 61) + "…";
        return s;
      }

      function normalizeDetailValue(v) {
        var s =
          typeof v === "number" || typeof v === "boolean"
            ? String(v)
            : v != null
              ? String(v)
              : "";
        return s.trim();
      }

      /** Match `formatDeviceTypeForSheetDisplay` in sheets.mjs (e.g. Desktop/Mobile). */
      function formatDeviceTypeForSummary(raw) {
        var s = normalizeDetailValue(raw);
        if (!s) return "";
        return s
          .split(/\s*[/,|]\s*/)
          .map(function (part) {
            var p = part.trim();
            if (!p) return "";
            var low = p.toLowerCase();
            if (low === "desktop") return "Desktop";
            if (low === "mobile") return "Mobile";
            if (low === "tablet") return "Tablet";
            return p.charAt(0).toUpperCase() + p.slice(1).toLowerCase();
          })
          .filter(Boolean)
          .join("/");
      }

      /** Match `formatChannelForSheetDisplay` in sheets.mjs (e.g. Web/WhatsApp/…). */
      function formatChannelForSummary(raw) {
        var s = normalizeDetailValue(raw);
        if (!s) return "";
        return s
          .split(/\s*[/,|]\s*/)
          .map(function (part) {
            var p = part.trim();
            if (!p) return "";
            var low = p.toLowerCase();
            if (low === "web") return "Web";
            if (low === "whatsapp") return "WhatsApp";
            if (low === "instagram") return "Instagram";
            if (low === "facebook") return "Facebook";
            if (low === "twitter") return "Twitter";
            if (low === "x") return "X";
            return p.charAt(0).toUpperCase() + p.slice(1).toLowerCase();
          })
          .filter(Boolean)
          .join("/");
      }

      /** Sheet / submission field key → stable semantic id (case- and space-insensitive). */
      function canonicalLeadFieldKey(rawKey) {
        var k = String(rawKey || "")
          .trim()
          .toLowerCase()
          .replace(/\s+/g, " ");
        var kn = k.replace(/\s/g, "");
        if (k === "name") return "name";
        if (k === "email") return "email";
        if (k === "mobile" || k === "phone") return "mobile";
        if (k === "user queries" || k === "userqueries") return "user_queries";
        if (k === "device" || k === "device type" || kn === "devicetype") return "device";
        if (k === "channel") return "channel";
        if (
          k === "browser"
          || k === "browser name"
          || kn === "browsername"
        )
          return "browser";
        if (k === "conv. date" || k === "conv date") return "conv_date";
        if (k === "conv. time" || k === "conv time") return "conv_time";
        if (
          k === "conversation date"
          || kn === "conversationdate"
        )
          return "conv_date";
        if (
          k === "conversation time"
          || kn === "conversationtime"
        )
          return "conv_time";
        return null;
      }

      function shouldDropSummaryFieldKey(rawKey) {
        var k = String(rawKey || "")
          .trim()
          .toLowerCase()
          .replace(/\s+/g, " ");
        var kn = k.replace(/\s/g, "");
        if (k === "form id" || k === "form_id" || kn === "formid") return true;
        if (k === "app. booked" || k === "app booked" || kn === "app.booked") return true;
        if (k === "scheduled") return true;
        if (k === "conv. link" || k === "conv link" || kn === "conv.link") return true;
        if (
          k === "chat link"
          || k === "chat script"
          || kn === "chatlink"
          || kn === "chatscript"
        )
          return true;
        if (k === "ip address" || kn === "ipaddress" || k === "ip") return true;
        if (
          k === "submitted at"
          || kn === "submittedat"
          || kn === "sheetrow"
          || k === "sheet row"
        )
          return true;
        return false;
      }

      /** @typedef {{ key: string, val: string } | null} ColHit */

      /** @returns {ColHit} */
      function findColumnEntryBySemantic(cols, semantic, consumedCol) {
        var keys = Object.keys(cols).sort(function (a, b) {
          return a.localeCompare(b);
        });
        for (var i = 0; i < keys.length; i++) {
          var key = keys[i];
          if (consumedCol && consumedCol[key]) continue;
          if (canonicalLeadFieldKey(key) === semantic) {
            return {
              key: key,
              val: normalizeDetailValue(cols[key])
            };
          }
        }
        return null;
      }

      function buildDetails(json) {
        /** @type {Array<[string, string]>} */
        var pairs = [];
        var meta = json.meta && typeof json.meta === "object" ? json.meta : {};
        var sheet = json.sheet && typeof json.sheet === "object" ? json.sheet : null;
        var cols = sheet && sheet.columns && typeof sheet.columns === "object" ? sheet.columns : null;

        /** @type {Record<string, true>} */
        var consumedCol = {};

        function pickSemantic(semantic, metaRaw) {
          var fromMeta = normalizeDetailValue(metaRaw);
          if (!cols) {
            return fromMeta;
          }
          var hit = findColumnEntryBySemantic(cols, semantic, consumedCol);
          if (hit) {
            consumedCol[hit.key] = true;
            return fromMeta || hit.val;
          }
          return fromMeta;
        }

        /** Sheet-only semantic (consume column). */
        function takeSemanticCol(semantic) {
          if (!cols) return "";
          var hit = findColumnEntryBySemantic(cols, semantic, consumedCol);
          if (!hit) return "";
          consumedCol[hit.key] = true;
          return hit.val;
        }

        var nameVal = pickSemantic("name", meta.name);
        var emailVal = pickSemantic("email", meta.email);
        var mobileVal = pickSemantic("mobile", meta.mobile);

        var userQueriesVal = "";
        if (cols) {
          var uqHit = findColumnEntryBySemantic(cols, "user_queries", consumedCol);
          if (uqHit) {
            consumedCol[uqHit.key] = true;
            userQueriesVal = uqHit.val;
          }
        }

        if (nameVal) pairs.push(["Name", String(nameVal)]);
        if (emailVal) pairs.push(["Email", String(emailVal)]);
        if (mobileVal) pairs.push(["Phone", String(mobileVal)]);

        var deviceVal = takeSemanticCol("device");
        var channelVal = takeSemanticCol("channel");
        var browserVal = takeSemanticCol("browser");
        var convDateVal = takeSemanticCol("conv_date");
        var convTimeVal = takeSemanticCol("conv_time");

        if (deviceVal) pairs.push(["Device", formatDeviceTypeForSummary(deviceVal)]);
        if (channelVal) pairs.push(["Channel", formatChannelForSummary(channelVal)]);
        if (browserVal) pairs.push(["Browser", String(browserVal)]);
        if (convDateVal) pairs.push(["Conv. Date", String(convDateVal)]);
        if (convTimeVal) pairs.push(["Conv. time", String(convTimeVal)]);

        if (cols) {
          var restKeys = Object.keys(cols).sort(function (a, b) {
            return a.localeCompare(b);
          });
          for (var r = 0; r < restKeys.length; r++) {
            var colKey = restKeys[r];
            if (consumedCol[colKey]) continue;
            if (shouldDropSummaryFieldKey(colKey)) continue;
            var sem = canonicalLeadFieldKey(colKey);
            if (
              sem === "name"
              || sem === "email"
              || sem === "mobile"
              || sem === "user_queries"
              || sem === "device"
              || sem === "channel"
              || sem === "browser"
              || sem === "conv_date"
              || sem === "conv_time"
            ) {
              continue;
            }
            var cellVal = normalizeDetailValue(cols[colKey]);
            if (!cellVal) continue;
            pairs.push([colKey, cellVal]);
          }
        }

        if (userQueriesVal) pairs.push(["User queries", String(userQueriesVal)]);

        if (!pairs.length) {
          detailsWrap.hidden = true;
          summaryRail.hidden = true;
          mainGrid.classList.remove("main-grid--split");
          return;
        }
        detailsWrap.hidden = false;
        summaryRail.hidden = false;
        mainGrid.classList.add("main-grid--split");
        var chunks = [];
        for (var j = 0; j < pairs.length; j++) {
          chunks.push(
            "<dt>" + escapeHtml(prettyLabel(pairs[j][0])) + "</dt><dd>" + escapeHtml(pairs[j][1]) + "</dd>"
          );
        }
        detailsDl.innerHTML = chunks.join("");
      }

      async function loadTranscript() {
        showErr("");
        thread.innerHTML = "";
        detailsDl.innerHTML = "";
        detailsWrap.hidden = true;
        summaryRail.hidden = true;
        mainGrid.classList.remove("main-grid--split");
        var session = sessionFromUrl();
        if (!session) {
          showErr("Missing ?session= in the URL. Use the link from your Google Sheet “Chat transcript” column.");
          return;
        }

        var secret = secretEl.value.trim();
        if (!secret) {
          showErr("Enter the viewer secret (same variable as CONVERSATIONS_SHEET_VIEW_SECRET).");
          return;
        }
        persistViewerSecret(secret);

        loadBtn.disabled = true;
        try {
          var url =
            "/api/conversation-transcript?session=" + encodeURIComponent(session);
          var res = await fetch(url, {
            method: "GET",
            headers: { "X-Conversations-Sheet-Secret": secret },
            cache: "no-store",
            credentials: "same-origin"
          });
          var json = await res.json().catch(function () {
            return null;
          });
          if (!res.ok || !json || !json.ok) {
            showErr((json && json.error) || "HTTP " + res.status);
            return;
          }

          authPanel.style.display = "none";
          toggleAuth.hidden = false;

          buildDetails(json);

          var transcriptTz =
            json.transcript_time_zone && String(json.transcript_time_zone).trim()
              ? String(json.transcript_time_zone).trim()
              : "";
          var transcriptIncDate =
            json.transcript_time_includes_date === true ? true : false;

          var turns = Array.isArray(json.turns) ? json.turns : [];
          if (!turns.length) {
            thread.innerHTML =
              '<div class="empty-hint">No chat lines stored for this session yet. After visitors message the bot and submit a lead, the full script appears here. User-only lines may still show from the Sheet if live sync ran.</div>';
            return;
          }

          thread.innerHTML = '<div class="day-line">Messages</div>';
          for (var i = 0; i < turns.length; i++) {
            var t = turns[i];
            var role = t && t.role === "assistant" ? "assistant" : "user";
            var who = role === "assistant" ? "Assistant" : "User";
            var atMs =
              t && typeof t.at === "number" && Number.isFinite(t.at) ? t.at : null;
            var timeLbl =
              atMs !== null && formatPersonaClockLabel(transcriptTz, atMs, transcriptIncDate).trim()
                ? formatPersonaClockLabel(transcriptTz, atMs, transcriptIncDate)
                : "";
            var timeHtml = timeLbl
              ? '<span class="msg-time">' + escapeHtml(timeLbl) + "</span>"
              : "";
            var row = document.createElement("div");
            row.className = "msg msg--" + role;
            row.innerHTML =
              '<div class="who"><span class="who-label">' +
              escapeHtml(who) +
              "</span>" +
              timeHtml +
              '</div><div class="msg-body' +
              (role === "assistant" ? " msg-body--rich" : "") +
              '">' +
              (role === "assistant"
                ? renderTurnBodyHtml(t)
                : '<p class="rc-text">' + escapeHtml((t && t.text) || "") + "</p>") +
              "</div>";
            thread.appendChild(row);
          }
          thread.scrollTop = thread.scrollHeight;
        } catch (e) {
          showErr(String(e && e.message ? e.message : e));
        } finally {
          loadBtn.disabled = false;
        }
      }

      loadBtn.addEventListener("click", function () {
        void loadTranscript();
      });
      toggleAuth.addEventListener("click", function () {
        authPanel.style.display = "block";
        toggleAuth.hidden = true;
      });

      if (savedSecret && sessionFromUrl()) {
        authPanel.style.display = "none";
        toggleAuth.hidden = false;
        void loadTranscript();
      }
    })();
  </script>
</body>
</html>

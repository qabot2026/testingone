<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conversation transcript</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: linear-gradient(180deg, #f1f5f9 0%, #e2e8f0 100%);
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: rgba(148, 163, 184, 0.4);
      --user: #0d9488;
      --user-soft: #ccfbf1;
      --bot: #334155;
      --bot-soft: #e9eef5;
      --radius: 16px;
      --radius-sm: 12px;
      font-family: "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.45;
      color: var(--text);
      background: var(--bg);
      min-height: 100dvh;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    .top {
      flex-shrink: 0;
      padding: 16px clamp(16px, 4vw, 28px) 12px;
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
    }
    .session-pill {
      margin-top: 10px;
      font-size: 0.72rem;
      color: var(--muted);
      word-break: break-all;
    }
    .session-pill code {
      font-size: 0.75rem;
      background: rgba(148, 163, 184, 0.15);
      padding: 2px 8px;
      border-radius: 8px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 10px;
      box-shadow: 0 2px 12px rgba(15, 23, 42, 0.05);
    }
    label.mini {
      display: block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font: inherit;
    }
    button.primary {
      margin-top: 10px;
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #14b8a6, #0d9488);
      color: #f0fdfa;
    }
    button.ghost {
      margin-top: 8px;
      width: 100%;
      padding: 6px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
      text-decoration: underline;
    }
    button.primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .err {
      color: #b91c1c;
      font-size: 0.8rem;
      margin-top: 8px;
    }
    .details-wrap {
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
      padding: 0 clamp(16px, 4vw, 28px) 8px;
    }
    .details-wrap h2 {
      margin: 0 0 8px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 700;
    }
    .dl-grid {
      display: grid;
      gap: 8px 14px;
      grid-template-columns: minmax(100px, 34%) 1fr;
      font-size: 0.82rem;
    }
    .dl-grid dt {
      margin: 0;
      color: var(--muted);
      font-weight: 600;
    }
    .dl-grid dd {
      margin: 0;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
      padding: 0 clamp(16px, 4vw, 28px) 24px;
    }
    .chat-stream {
      flex: 1;
      min-height: 200px;
      max-height: min(72vh, 720px);
      overflow-y: auto;
      padding: 12px 4px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-gutter: stable;
    }
    .day-line {
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      padding: 6px 0;
    }
    .msg {
      max-width: 92%;
      padding: 10px 14px;
      border-radius: var(--radius);
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.92rem;
    }
    .msg--user {
      align-self: flex-end;
      background: var(--user-soft);
      border-bottom-right-radius: 4px;
      margin-left: 18%;
      border: 1px solid rgba(13, 148, 136, 0.2);
    }
    .msg--assistant {
      align-self: flex-start;
      background: var(--bot-soft);
      border-bottom-left-radius: 4px;
      margin-right: 10%;
      border: 1px solid rgba(51, 65, 85, 0.12);
    }
    .msg .who {
      font-size: 0.62rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 4px;
      color: var(--user);
    }
    .msg--assistant .who {
      color: var(--bot);
    }
    .empty-hint {
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      padding: 24px 12px;
    }
    .source-tag {
      font-size: 0.68rem;
      color: var(--muted);
      padding: 0 clamp(16px, 4vw, 28px) 8px;
      max-width: 560px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <header class="top">
    <h1>Conversation</h1>
    <p class="sub">User and assistant messages, plus the same lead fields as your Google Sheet row.</p>
    <div class="session-pill" id="sessionLine" hidden>Session <code id="sessionCode"></code></div>
    <div class="panel" id="authPanel">
      <label class="mini" for="secret">Viewer secret</label>
      <input id="secret" type="password" autocomplete="current-password" placeholder="Same as conversations inbox" />
      <button type="button" class="primary" id="loadBtn">Load conversation</button>
      <button type="button" class="ghost" id="toggleAuth" hidden>Show secret field</button>
      <p class="err" id="errBox" hidden></p>
    </div>
  </header>

  <div class="details-wrap" id="detailsWrap" hidden>
    <h2>Lead details (sheet + submission)</h2>
    <div class="panel">
      <dl class="dl-grid" id="detailsDl"></dl>
    </div>
  </div>

  <p class="source-tag" id="sourceTag" hidden></p>

  <div class="chat-wrap">
    <div class="chat-stream" id="thread" aria-live="polite"></div>
  </div>

  <script>
    (function () {
      var LS_KEY = "conversations_sheet_secret_v1";
      var secretEl = document.getElementById("secret");
      var loadBtn = document.getElementById("loadBtn");
      var errBox = document.getElementById("errBox");
      var thread = document.getElementById("thread");
      var sessionLine = document.getElementById("sessionLine");
      var sessionCode = document.getElementById("sessionCode");
      var detailsWrap = document.getElementById("detailsWrap");
      var detailsDl = document.getElementById("detailsDl");
      var sourceTag = document.getElementById("sourceTag");
      var authPanel = document.getElementById("authPanel");
      var toggleAuth = document.getElementById("toggleAuth");

      try {
        var saved = localStorage.getItem(LS_KEY);
        if (saved) secretEl.value = saved;
      } catch (ignore) {}

      function escapeHtml(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function sessionFromUrl() {
        try {
          var q = new URLSearchParams(window.location.search).get("session");
          return q && q.trim() ? q.trim() : "";
        } catch {
          return "";
        }
      }

      function showErr(msg) {
        if (!msg) {
          errBox.hidden = true;
          errBox.textContent = "";
          return;
        }
        errBox.hidden = false;
        errBox.textContent = msg;
      }

      function prettyLabel(k) {
        var s = String(k || "");
        if (s.length > 64) return s.slice(0, 61) + "…";
        return s;
      }

      function buildDetails(json) {
        /** @type {Array<[string, string]>} */
        var pairs = [];
        var meta = json.meta && typeof json.meta === "object" ? json.meta : {};
        var sheet = json.sheet && typeof json.sheet === "object" ? json.sheet : null;
        var cols = sheet && sheet.columns && typeof sheet.columns === "object" ? sheet.columns : null;

        if (meta.name != null && String(meta.name).trim())
          pairs.push(["Name (submission)", String(meta.name)]);
        if (meta.email != null && String(meta.email).trim())
          pairs.push(["Email (submission)", String(meta.email)]);
        if (meta.mobile != null && String(meta.mobile).trim())
          pairs.push(["Mobile (submission)", String(meta.mobile)]);
        if (meta.form_id != null && String(meta.form_id).trim())
          pairs.push(["Form id", String(meta.form_id)]);
        if (meta.submitted_at != null && String(meta.submitted_at).trim())
          pairs.push(["Submitted at", String(meta.submitted_at)]);
        if (sheet && sheet.rowNumber)
          pairs.push(["Sheet row", String(sheet.rowNumber)]);

        if (cols) {
          var keys = Object.keys(cols).sort(function (a, b) {
            return a.localeCompare(b);
          });
          for (var i = 0; i < keys.length; i++) {
            pairs.push([keys[i], cols[keys[i]]]);
          }
        }

        if (!pairs.length) {
          detailsWrap.hidden = true;
          return;
        }
        detailsWrap.hidden = false;
        var chunks = [];
        for (var j = 0; j < pairs.length; j++) {
          chunks.push(
            "<dt>" + escapeHtml(prettyLabel(pairs[j][0])) + "</dt><dd>" + escapeHtml(pairs[j][1]) + "</dd>"
          );
        }
        detailsDl.innerHTML = chunks.join("");
      }

      async function loadTranscript() {
        showErr("");
        thread.innerHTML = "";
        detailsDl.innerHTML = "";
        detailsWrap.hidden = true;
        sourceTag.hidden = true;

        var session = sessionFromUrl();
        if (!session) {
          showErr("Missing ?session= in the URL. Use the link from your Google Sheet “Chat transcript” column.");
          sessionLine.hidden = true;
          return;
        }
        sessionLine.hidden = false;
        sessionCode.textContent = session;

        var secret = secretEl.value.trim();
        if (!secret) {
          showErr("Enter the viewer secret (same variable as CONVERSATIONS_SHEET_VIEW_SECRET).");
          return;
        }
        try {
          localStorage.setItem(LS_KEY, secret);
        } catch (ignore) {}

        loadBtn.disabled = true;
        try {
          var url =
            "/api/conversation-transcript?session=" + encodeURIComponent(session);
          var res = await fetch(url, {
            method: "GET",
            headers: { "X-Conversations-Sheet-Secret": secret },
            cache: "no-store",
            credentials: "same-origin"
          });
          var json = await res.json().catch(function () {
            return null;
          });
          if (!res.ok || !json || !json.ok) {
            showErr((json && json.error) || "HTTP " + res.status);
            return;
          }

          authPanel.style.display = "none";
          toggleAuth.hidden = false;

          buildDetails(json);

          var parts = [];
          if (json.source && json.source !== "none") {
            parts.push(
              "Data source: " +
                json.source +
                " — refreshes when the visitor chats and sync/submit runs."
            );
          }
          if (json.transcript_fallback === "lead_snapshot") {
            parts.push(
              "Fallback: assistant bubble shows saved lead/form fields only (exact bot replies were not stored). Add Sheet column SHEETS_CHAT_TRANSCRIPT_JSON_COLUMN or header “Chat transcript JSON”, redeploy, and run new chats so sync writes JSON."
            );
          }
          if (parts.length) {
            sourceTag.hidden = false;
            sourceTag.textContent = parts.join(" ");
          }

          var turns = Array.isArray(json.turns) ? json.turns : [];
          if (!turns.length) {
            thread.innerHTML =
              '<div class="empty-hint">No chat lines stored for this session yet. After visitors message the bot and submit a lead, the full script appears here. User-only lines may still show from the Sheet if live sync ran.</div>';
            return;
          }

          thread.innerHTML = '<div class="day-line">Messages</div>';
          for (var i = 0; i < turns.length; i++) {
            var t = turns[i];
            var role = t && t.role === "assistant" ? "assistant" : "user";
            var text = t && typeof t.text === "string" ? t.text : "";
            var who = role === "assistant" ? "Assistant" : "User";
            var row = document.createElement("div");
            row.className = "msg msg--" + role;
            row.innerHTML =
              '<div class="who">' +
              escapeHtml(who) +
              "</div>" +
              escapeHtml(text);
            thread.appendChild(row);
          }
          thread.scrollTop = thread.scrollHeight;
        } catch (e) {
          showErr(String(e && e.message ? e.message : e));
        } finally {
          loadBtn.disabled = false;
        }
      }

      loadBtn.addEventListener("click", function () {
        void loadTranscript();
      });
      toggleAuth.addEventListener("click", function () {
        authPanel.style.display = "block";
        toggleAuth.hidden = true;
      });

      if (secretEl.value.trim() && sessionFromUrl()) {
        void loadTranscript();
      }
    })();
  </script>
</body>
</html>

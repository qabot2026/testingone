<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="ES chatbot QA sandbox — test without creating leads" />
  <meta name="theme-color" content="#b45309" />
  <title>Chatbot — QA Test</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(160deg, #fffbeb 0%, #fef3c7 40%, #f8fafc 100%);
      color: #0f172a;
    }
    .qa-sandbox-banner {
      position: sticky;
      top: 0;
      z-index: 9998;
      padding: 0.65rem 1rem;
      background: #b45309;
      color: #fffbeb;
      text-align: center;
      font-size: 0.875rem;
      line-height: 1.45;
      box-shadow: 0 2px 8px rgba(180, 83, 9, 0.25);
    }
    .qa-sandbox-banner strong { font-weight: 700; }
    .demo-hero {
      max-width: 560px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
      text-align: center;
    }
    .demo-hero h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #b45309;
      margin: 0 0 0.75rem;
    }
    .demo-hero p {
      color: #64748b;
      line-height: 1.6;
      margin: 0 0 0.75rem;
    }
    .demo-hero .hint {
      margin-top: 1.5rem;
      font-size: 0.8125rem;
      color: #94a3b8;
    }
    .demo-hero a { color: #0f766e; }
  </style>
</head>
<body>
  <div class="qa-sandbox-banner" role="status">
    <strong>QA test mode</strong> — chatbot works here but no leads, Google Sheet rows, or appointment bookings are saved.
  </div>
  <main class="demo-hero">
    <h1>Chatbot — QA</h1>
    <p>Use the chat button bottom-right to test Dialogflow ES flows safely. Nothing is written to production data.</p>
    <p class="hint">Production chat: <a href="/chat-frame.html">chat frame</a> · Staff dashboard: <a href="/dashboard/">Analytics</a></p>
  </main>
  <script>
    (function () {
      window.COMPANY_QA_MODE = true;
      var id = "qa-test-" + Date.now() + "-" + Math.random().toString(16).slice(2, 10);
      try {
        sessionStorage.setItem("company_qa_session_id", id);
      } catch (e) { /* ignore */ }
      window.COMPANY_QA_SESSION_ID = id;
    })();
  </script>
  <script src="https://qabot2026.github.io/testingone/company-loader.js?botid=0001&v=8"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en-IN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Customer documents</title>
    <link rel="stylesheet" href="dashboard.css" />
    <link rel="stylesheet" href="documents.css?v=20260615i" />
  </head>
  <body>
    <div class="dash-app docs-app dash-page-content" style="display:none">
      <div class="docs-toolbar-row" style="display:flex;justify-content:flex-end;margin-bottom:0.75rem">
        <button type="button" id="docs-refresh" class="dash-btn dash-btn--primary">Refresh</button>
      </div>

      <section class="dash-grid docs-summary" aria-label="Summary">
        <div class="dash-card">
          <div class="dash-card__value" id="docs-count-users">—</div>
          <div class="dash-card__label">Unique uploaders</div>
        </div>
        <div class="dash-card">
          <div class="dash-card__value" id="docs-count-submissions">—</div>
          <div class="dash-card__label">Submissions</div>
        </div>
        <div class="dash-card">
          <div class="dash-card__value" id="docs-count-files">—</div>
          <div class="dash-card__label">Documents</div>
        </div>
        <div class="dash-card">
          <div class="dash-card__value" id="docs-count-size">—</div>
          <div class="dash-card__label">Total size</div>
        </div>
      </section>

      <section class="docs-panel">
        <div class="docs-panel__toolbar">
          <label class="docs-search-label">
            <span class="visually-hidden">Search</span>
            <input
              type="search"
              id="docs-search"
              class="docs-search"
              placeholder="Search by name, mobile, file…"
              autocomplete="off"
            />
          </label>
          <div class="docs-date-range" aria-label="Date range">
            <label class="docs-date-range__field">
              <span class="docs-date-range__label">From</span>
              <div class="docs-date-field">
                <svg class="docs-date-cal-ic" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                  <path d="M16 2v4M8 2v4M3 10h18" />
                </svg>
                <input
                  type="text"
                  id="docs-date-from"
                  class="docs-date-text"
                  placeholder="DD/MM/YYYY"
                  inputmode="numeric"
                  autocomplete="off"
                  title="Pick a date or type DD/MM/YYYY"
                />
                <input type="date" class="docs-date-native" tabindex="-1" aria-hidden="true" />
              </div>
            </label>
            <label class="docs-date-range__field">
              <span class="docs-date-range__label">To</span>
              <div class="docs-date-field">
                <svg class="docs-date-cal-ic" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                  <path d="M16 2v4M8 2v4M3 10h18" />
                </svg>
                <input
                  type="text"
                  id="docs-date-to"
                  class="docs-date-text"
                  placeholder="DD/MM/YYYY"
                  inputmode="numeric"
                  autocomplete="off"
                  title="Pick a date or type DD/MM/YYYY"
                />
                <input type="date" class="docs-date-native" tabindex="-1" aria-hidden="true" />
              </div>
            </label>
            <button type="button" id="docs-date-last5" class="dash-btn dash-btn--ghost docs-date-preset">
              Last 5 days
            </button>
            <button type="button" id="docs-date-clear" class="dash-btn dash-btn--ghost docs-date-preset">
              Clear
            </button>
          </div>
        </div>

        <div id="docs-alert" class="docs-alert" hidden></div>

        <div class="docs-table-wrap">
          <table class="docs-table" id="docs-table">
            <thead>
              <tr>
                <th scope="col">Document</th>
                <th scope="col">Assistant</th>
                <th scope="col">Channel</th>
                <th scope="col">Tag</th>
                <th scope="col">Name</th>
                <th scope="col">Email</th>
                <th scope="col">Mobile</th>
                <th scope="col">Date</th>
                <th scope="col">Size</th>
                <th scope="col">Actions</th>
              </tr>
            </thead>
            <tbody id="docs-tbody">
              <tr>
                <td colspan="10" class="docs-table__empty">Loading…</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
    <script src="desk-auth.js"></script>
    <script src="dashboard-nav.js?v=20260626a"></script>
    <script src="date-display.js"></script>
    <script src="documents.js"></script>
    <script>
      DashboardNav.mountPage({
        active: 'documents',
        title: 'Customer uploads',
        subtitle: 'Files sent via chat or forms · all bots',
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Audits</title>
    <link rel="stylesheet" href="../dashboard/dashboard.css" />
    <link rel="stylesheet" href="../dashboard/dashboard-nav.css?v=20260626a" />
    <link rel="stylesheet" href="../dashboard/admin-pages.css?v=20260624a" />
  </head>
  <body>
    <div class="dash-page-content" style="display:none">
      <div class="dash-app admin-app">
        <p class="dash-muted">
          Each change gets a short ID (e.g. <code>#FAQ-15143022AB</code>) plus a plain summary you can read at a glance.
        </p>

        <div class="admin-toolbar">
          <label>
            Days
            <select id="audits-days">
              <option value="7">Last 7 days</option>
              <option value="30" selected>Last 30 days</option>
              <option value="90">Last 90 days</option>
            </select>
          </label>
          <label>
            Bot ID filter
            <input id="audits-bot" placeholder="All bots" inputmode="numeric" maxlength="5" autocomplete="off" />
          </label>
          <label>
            Page contains
            <input id="audits-page" placeholder="FAQs" autocomplete="off" />
          </label>
          <button type="button" id="audits-clear-filters" class="dash-btn dash-btn--ghost">Clear filters</button>
          <button type="button" id="audits-refresh" class="dash-btn dash-btn--primary">Refresh</button>
        </div>

        <div class="admin-table-wrap">
          <table class="admin-table" aria-label="Audit log">
            <thead>
              <tr>
                <th>Change ID</th>
                <th>Date &amp; time</th>
                <th>User</th>
                <th>Page</th>
                <th>Change</th>
                <th>Bot</th>
                <th>What changed</th>
              </tr>
            </thead>
            <tbody id="audits-body"></tbody>
          </table>
        </div>
        <p class="admin-status" id="audits-status" hidden></p>
      </div>
    </div>
    <script src="../dashboard/desk-auth.js"></script>
    <script src="../dashboard/dashboard-nav.js?v=20260626a"></script>
    <script src="audits.js?v=20260624a"></script>
  </body>
</html>

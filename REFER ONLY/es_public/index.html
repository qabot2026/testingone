<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ES Chatbot — AI quality & compliance chatbot" />
  <meta name="theme-color" content="#0f766e" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>ES Chatbot</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(160deg, #f0fdfa 0%, #ecfeff 40%, #f8fafc 100%);
      color: #0f172a;
    }
    .demo-hero {
      max-width: 520px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
      text-align: center;
    }
    .demo-hero h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #0f766e;
      margin: 0 0 0.75rem;
    }
    .demo-hero p {
      color: #64748b;
      line-height: 1.6;
      margin: 0;
    }
    .demo-hero .hint {
      margin-top: 2rem;
      font-size: 0.875rem;
      color: #94a3b8;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main class="demo-hero">
    <h1>ES Chatbot</h1>
    <p>Modern chat for quality &amp; compliance. Use the chat button bottom-right to open the assistant.</p>
    <p class="hint">Production: es-based-chatbot-production.up.railway.app</p>
  </main>
  <script src="/embed.js" async></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chatbot preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/widget/chat-widget.css?v=20260619b" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      max-height: none;
      position: relative;
      overflow: visible !important;
      background: linear-gradient(160deg, #f0f4f8 0%, #e8eef5 100%);
    }
    .preview-hint {
      position: fixed;
      top: 8px;
      left: 0;
      right: 0;
      z-index: 0;
      font: 12px/1.4 system-ui, sans-serif;
      color: #94a3b8;
      text-align: center;
      pointer-events: none;
      margin: 0;
    }
    body.qa-bot-preview--mob {
      max-width: 390px;
      margin: 0 auto;
      box-shadow: inset 1px 0 0 #e2e8f0, inset -1px 0 0 #e2e8f0;
    }
  </style>
</head>
<body class="qa-bot-preview">
  <p class="preview-hint" id="previewHint">Loading preview…</p>
  <script>
    (function () {
      'use strict';
      var ASSET_V = '20260619b';
      var hint = document.getElementById('previewHint');
      var scriptsDone = false;

      function setHint(msg, isError) {
        if (!hint) return;
        hint.textContent = msg;
        hint.style.color = isError ? '#dc2626' : '#94a3b8';
        hint.style.display = '';
      }

      function loadScript(src, cb) {
        var s = document.createElement('script');
        s.src = src;
        s.async = false;
        var finished = false;
        function done(ok) {
          if (finished) return;
          finished = true;
          if (!ok) {
            console.warn('[preview] script failed', src);
          }
          if (cb) cb(ok);
        }
        s.onload = function () {
          done(true);
        };
        s.onerror = function () {
          done(false);
        };
        document.head.appendChild(s);
      }

      function loadChain(urls, index, cb) {
        if (index >= urls.length) {
          scriptsDone = true;
          if (cb) cb();
          return;
        }
        var src = urls[index];
        setHint('Loading preview (' + (index + 1) + '/' + urls.length + ')…', false);
        loadScript(src, function (ok) {
          if (!ok && index < 2) {
            setHint('Preview failed to load: ' + src, true);
            return;
          }
          loadChain(urls, index + 1, cb);
        });
      }

      var scripts = [
        '/company.config.js',
        '/widget/date-display.js',
        '/widget/message-syntax.js',
        '/widget/chat-form.js',
        '/widget/chat-widget.js?v=' + ASSET_V,
        '/bot-settings/preview.js?v=' + ASSET_V
      ];

      loadChain(scripts, 0, function () {
        if (!window.ESChatWidget) {
          setHint('Preview failed: chat widget did not load.', true);
        }
      });

      setTimeout(function () {
        if (!scriptsDone && hint && /Loading preview/i.test(hint.textContent)) {
          setHint('Preview timed out — hard-refresh the appearance page.', true);
        }
      }, 15000);
    })();
  </script>
</body>
</html>

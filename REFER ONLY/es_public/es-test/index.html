<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="ES Chatbot QA sandbox — test chatbot without creating leads" />
  <meta name="theme-color" content="#b45309" />
  <title>ES Chatbot — QA Test</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(160deg, #fffbeb 0%, #fef3c7 40%, #f8fafc 100%);
      color: #0f172a;
    }
    .qa-sandbox-banner {
      position: sticky;
      top: 0;
      z-index: 9998;
      padding: 0.65rem 1rem;
      background: #b45309;
      color: #fffbeb;
      text-align: center;
      font-size: 0.875rem;
      line-height: 1.45;
      box-shadow: 0 2px 8px rgba(180, 83, 9, 0.25);
    }
    .qa-sandbox-banner strong { font-weight: 700; }
    .demo-hero {
      max-width: 560px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
      text-align: center;
    }
    .demo-hero h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #b45309;
      margin: 0 0 0.75rem;
    }
    .demo-hero p {
      color: #64748b;
      line-height: 1.6;
      margin: 0 0 0.75rem;
    }
    .demo-hero .hint {
      margin-top: 1.5rem;
      font-size: 0.8125rem;
      color: #94a3b8;
    }
    .demo-hero a { color: #0f766e; }
  </style>
</head>
<body>
  <div class="qa-sandbox-banner" role="status">
    <strong>QA test mode</strong> — chatbot works here but no leads, conversations, Google Sheet rows, or appointment bookings are saved.
  </div>
  <main class="demo-hero">
    <h1>ES Chatbot — QA</h1>
    <p>Use the chat button bottom-right to test flows safely. Dialogflow replies appear normally; nothing is written to production data.</p>
    <p class="hint">Production chat: <a href="/">home page</a></p>
  </main>
  <script>
    window.ES_CONFIG = window.ES_CONFIG || {};
    window.ES_CONFIG.esTestMode = true;
  </script>
  <script src="/embed.js" async></script>
</body>
</html>
